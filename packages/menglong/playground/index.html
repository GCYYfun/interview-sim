<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MengLong SDK 极简测试页</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #38bdf8; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 900px; margin: 2rem auto; background: var(--bg); color: var(--text); line-height: 1.5; padding: 0 1rem; }
        h1 { font-weight: 800; letter-spacing: -0.025em; color: var(--accent); }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h3 { margin-top: 0; font-size: 1.1rem; color: #94a3b8; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        input, select, button { background: #0f172a; color: #fff; border: 1px solid #334155; padding: 10px 14px; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        input:focus { outline: none; border-color: var(--accent); ring: 2px var(--accent); }
        button { background: var(--accent); color: #000; font-weight: 600; cursor: pointer; border: none; transition: opacity 0.2s; margin-top: 10px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #output { white-space: pre-wrap; background: #000; padding: 1.25rem; border-radius: 8px; min-height: 151px; border: 1px solid #334155; font-family: "Fira Code", monospace; font-size: 14px; color: #cbd5e1; overflow-y: auto; max-height: 500px; }
        .status { margin-top: 12px; font-size: 13px; color: #64748b; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: #64748b; border-radius: 50%; }
        .dot.active { background: #10b981; box-shadow: 0 0 8px #10b981; }
    </style>
</head>
<body>
    <h1>MengLong Playground</h1>
    
    <div class="card">
        <h3>1. 配置 (Provider: DeepSeek/OpenAI)</h3>
        <div class="grid">
            <div>
                <label style="font-size: 12px; color: #64748b;">API Key</label>
                <input id="apiKey" type="password" placeholder="sk-...">
            </div>
            <div>
                <label style="font-size: 12px; color: #64748b;">Base URL</label>
                <input id="baseUrl" type="text" placeholder="https://..." value="http://localhost:8000/menglong">
            </div>
        </div>
        <div style="margin-top: 10px;">
            <label style="font-size: 12px; color: #64748b;">Model ID (前缀决定 Provider: deepseek/ 或 openai/)</label>
            <input id="model" type="text" placeholder="deepseek-chat" value="deepseek-chat">
        </div>
    </div>

    <div class="card">
        <h3>2. 消息测试</h3>
        <input id="prompt" type="text" value="请用 50 字介绍一下什么是量子计算？" placeholder="输入您的问题...">
        <button id="sendBtn">流式发送请求</button>
        <div class="status" id="status">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">准备就绪</span>
        </div>
    </div>

    <div class="card">
        <h3>3. 实时输出</h3>
        <div id="output">等待发送消息...</div>
    </div>

    <script type="module" src="./main.ts"></script>
</body>
</html>
